name: Setup Kanban

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  setup:
    # Auto-run only on first push (repo created from template); always run on workflow_dispatch
    if: github.event_name == 'workflow_dispatch' || github.run_number == 1
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Criar labels do kanban
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "backlog"      --color "ededed" --description "Ideias e tarefas futuras"  --repo ${{ github.repository }} --force
          gh label create "todo"         --color "0075ca" --description "Próximas a fazer"           --repo ${{ github.repository }} --force
          gh label create "in-progress"  --color "e4e669" --description "Em andamento"               --repo ${{ github.repository }} --force
          gh label create "review"       --color "d93f0b" --description "Aguardando revisão"         --repo ${{ github.repository }} --force
          gh label create "done"         --color "0e8a16" --description "Concluído"                  --repo ${{ github.repository }} --force

      - name: Criar GitHub Project board
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          OWNER_ID=$(gh api graphql -f query='query { viewer { id } }' --jq '.data.viewer.id')
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          PROJECT_TITLE="${REPO_NAME} Kanban"

          EXISTING_PROJECT=$(gh api graphql -f query="
            query {
              viewer {
                projectsV2(first: 100, orderBy: {field: TITLE, direction: ASC}) {
                  nodes {
                    id
                    title
                    url
                  }
                }
              }
            }
          " --jq ".data.viewer.projectsV2.nodes[] | select(.title == \"$PROJECT_TITLE\")" || true)

          if [ -n "$EXISTING_PROJECT" ]; then
            PROJECT_ID=$(echo "$EXISTING_PROJECT" | jq -r '.id')
            PROJECT_URL=$(echo "$EXISTING_PROJECT" | jq -r '.url')
            echo "Project existente encontrado: $PROJECT_URL"
          else
            PROJECT_DATA=$(gh api graphql -f query="
              mutation {
                createProjectV2(input: {ownerId: \"$OWNER_ID\", title: \"$PROJECT_TITLE\"}) {
                  projectV2 { id url }
                }
              }
            ")

            PROJECT_ID=$(echo "$PROJECT_DATA" | jq -r '.data.createProjectV2.projectV2.id')
            PROJECT_URL=$(echo "$PROJECT_DATA" | jq -r '.data.createProjectV2.projectV2.url')
            echo "Project criado: $PROJECT_URL"
          fi

          STATUS_FIELD_ID=$(gh api graphql -f query="
            query {
              node(id: \"$PROJECT_ID\") {
                ... on ProjectV2 {
                  fields(first: 20) {
                    nodes {
                      ... on ProjectV2SingleSelectField {
                        id
                        name
                        options {
                          name
                        }
                      }
                    }
                  }
                }
              }
            }
          " --jq '.data.node.fields.nodes[] | select(.name == "Status") | .id' || true)

          if [ -z "$STATUS_FIELD_ID" ]; then
            echo "Campo Status não encontrado."
            exit 1
          fi

          for OPTION in \
            'Backlog|GRAY|Ideias e tarefas futuras' \
            'Review|RED|Aguardando revisão'; do
            NAME=$(echo "$OPTION" | cut -d'|' -f1)
            COLOR=$(echo "$OPTION" | cut -d'|' -f2)
            DESC=$(echo "$OPTION" | cut -d'|' -f3)

            HAS_OPTION=$(gh api graphql -f query="
              query {
                node(id: \"$PROJECT_ID\") {
                  ... on ProjectV2 {
                    fields(first: 20) {
                      nodes {
                        ... on ProjectV2SingleSelectField {
                          id
                          name
                          options {
                            name
                          }
                        }
                      }
                    }
                  }
                }
              }
            " --jq ".data.node.fields.nodes[] | select(.name == \"Status\") | .options[]?.name | select(. == \"$NAME\")" || true)

            if [ -n "$HAS_OPTION" ]; then
              echo "Opcao $NAME ja existe; pulando."
            else
              gh api graphql -f query="
                mutation {
                  addProjectV2SingleSelectFieldOptionToField(input: {
                    projectId: \"$PROJECT_ID\",
                    fieldId: \"$STATUS_FIELD_ID\",
                    name: \"$NAME\",
                    color: $COLOR,
                    description: \"$DESC\"
                  }) {
                    field {
                      ... on ProjectV2SingleSelectField {
                        id
                        name
                      }
                    }
                  }
                }
              "
            fi
          done

      - name: Criar issue de Getting Started
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --repo ${{ github.repository }} \
            --title "🚀 Getting Started" \
            --label "todo" \
            --body "## Setup inicial

          - [ ] Renomear \`project-name\` em \`pyproject.toml\`
          - [ ] Criar \`.mcp.json\` a partir de \`.mcp.json.example\` (não commitar)
          - [ ] Criar \`CLAUDE.local.md\` a partir de \`CLAUDE.local.md.example\` (não commitar)
          - [ ] Rodar \`uv sync\` para instalar dependências
          - [ ] Abrir o projeto no Claude Code: \`claude\`

          > Este issue foi criado automaticamente pelo workflow Setup Kanban."
